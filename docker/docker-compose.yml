services:
  # Database (PostGIS + pgvector)
  postgres:
    build:
      context: ..
      dockerfile: Dockerfile.postgres
    container_name: worlddash-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-worlddash}
      POSTGRES_USER: ${POSTGRES_USER:-worlddash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worlddash"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worlddash

  # Redis
  redis:
    image: redis:7-alpine
    container_name: worlddash-redis
    ports:
      - "6700:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - worlddash

  # API Service
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: worlddash-api
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-worlddash}
      POSTGRES_USER: ${POSTGRES_USER:-worlddash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worlddash
    restart: unless-stopped

  # Celery Worker (fast tasks: ingest, normalize, analyze)
  worker:
    build:
      context: ..
      dockerfile: Dockerfile.worker
    container_name: worlddash-worker
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-worlddash}
      POSTGRES_USER: ${POSTGRES_USER:-worlddash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worlddash
    restart: unless-stopped

  # Celery LLM Worker (slow tasks: Ollama — concurrency=1)
  llm-worker:
    build:
      context: ..
      dockerfile: Dockerfile.llm-worker
    container_name: worlddash-llm-worker
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-worlddash}
      POSTGRES_USER: ${POSTGRES_USER:-worlddash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worlddash
    restart: unless-stopped

  # Celery Beat (Scheduler)
  beat:
    build:
      context: ..
      dockerfile: Dockerfile.beat
    container_name: worlddash-beat
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-worlddash}
      POSTGRES_USER: ${POSTGRES_USER:-worlddash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FEED_POLL_INTERVAL_SECONDS: ${FEED_POLL_INTERVAL_SECONDS:-300}
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
    depends_on:
      - worker
      - llm-worker
      - redis
    networks:
      - worlddash
    restart: unless-stopped

  # Frontend (Development - for production, build and use nginx)
  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: worlddash-web
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - worlddash
    restart: unless-stopped

networks:
  worlddash:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
